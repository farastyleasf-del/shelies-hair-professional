server {
    listen 3000;
    client_max_body_size 100m;

    # Uploads → backend Express
    location /uploads/ {
        proxy_pass http://shelie_spa_back:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header Accept-Ranges bytes;
    }

    # API → backend Express
    location /api/ {
        proxy_pass http://shelie_spa_back:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    # Videos — streaming directo, sin buffering, range requests
    location ~* \.(mp4|webm|mov|avi)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header Accept-Ranges bytes;
        add_header X-Accel-Buffering no;
        try_files $uri @nextjs;
    }

    # Imágenes — compresión + caché
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Accel-Buffering no;
        gzip on;
        gzip_types image/svg+xml;
        try_files $uri @nextjs;
    }

    # Next.js chunks estáticos — inmutables
    location /_next/static/ {
        proxy_pass http://shelie_spa_nextjs:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
        proxy_buffering off;
    }

    # Todo lo demás → Next.js
    location / {
        proxy_pass http://shelie_spa_nextjs:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    location @nextjs {
        proxy_pass http://shelie_spa_nextjs:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
    }
}
